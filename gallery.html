<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Projects | Prime Landscaping</title>
<meta name="description" content="View our portfolio of commercial and residential landscaping projects, ground clearing, and hardscaping.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header-placeholder"></div>

<main>
<section class="hero">
  <img src="images/gallery-hero.webp"
     alt="Completed Landscaping Projects"
     class="hero-bg">
<div class="hero-overlay"></div>
<div class="container hero-content text-center">
<span class="hero-tag">Our Track Record</span>
<h1 class="display-1">Proven Results</h1>
<p class="hero-lead">Explore our recent ground transformations for commercial and residential properties.</p>
</div>
</section>

<section class="section bg-light">
<div class="container">
<div class="section-title text-center">
<h2>Vision Realized</h2>
<p>The difference professional ground preparation makes.</p>
</div>
<div class="grid-2">
<div class="service-card">
<div style="padding: 15px; background: var(--dark); color: var(--white); font-weight: bold; text-align: center;">BEFORE</div>
<img src="images/before-project.webp" alt="Site before clearing" loading="lazy">
</div>
<div class="service-card">
<div style="padding: 15px; background: var(--primary); color: var(--white); font-weight: bold; text-align: center;">AFTER</div>
<img src="images/after-project.webp" alt="Site after professional landscaping" loading="lazy">
</div>
</div>
</div>
</section>

<section class="section">
<div class="container">
<div class="section-title text-center">
<h2>Project Portfolio</h2>
</div>

<div class="gallery-grid">
<div class="gallery-item commercial">
<img src="images/gallery-1.webp" alt="Commercial ground clearing" loading="lazy">
</div>
<div class="gallery-item residential">
<img src="images/gallery-2.webp" alt="Residential hardscaping" loading="lazy">
</div>
<div class="gallery-item commercial">
<img src="images/gallery-3.webp" alt="Industrial retaining wall" loading="lazy">
</div>
<div class="gallery-item residential">
<img src="images/gallery-4.webp" alt="Backyard turf installation" loading="lazy">
</div>
<div class="gallery-item commercial">
<img src="images/gallery-5.webp" alt="Business park landscaping" loading="lazy">
</div>
<div class="gallery-item residential">
<img src="images/gallery-6.webp" alt="Stone pathway installation" loading="lazy">
</div>
</div>
</div>
</section>

</main>

<div id="footer-placeholder"></div>

<script src="js/main.js"></script>

</html>
